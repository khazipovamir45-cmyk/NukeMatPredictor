<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>График зависимости прочности от температуры</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #020e43bf 0%, #260449c2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .content {
            padding: 40px;
        }
        
        .chart-container {
            position: relative;
        }
        
        canvas {
            max-height: 500px;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentChart = null;
        
        // =======================================
        // ДАННЫЕ ДЛЯ ГРАФИКА (можно менять здесь)
        // =======================================
        // Сталь ЭП823-Ш (16Х12МВСФБР-Ш) из вашего CSV
        // температура = 650°C, прочность = 600 МПа, temp_coef = 0.11 МПа/°C
        const materialData = {
            point: {
                x: 650,        // температура (°C)
                y: 600         // минимальная прочность (МПа)
            },
            slope: 0.11        // температурный коэффициент (МПа/°C)
        };
        
        // ============================================
        // Функция генерации точек линии
        // ============================================
        function generateLinePoints(point, slope, xMin = 0, xMax = 1200, pointsCount = 100) {
            const points = [];
            const step = (xMax - xMin) / pointsCount;
            const x0 = point.x;
            const y0 = point.y;
            
            for (let i = 0; i <= pointsCount; i++) {
                const x = xMin + i * step;
                const y = y0 + slope * (x - x0);
                const finalY = Math.max(0, y);
                
                points.push({
                    x: parseFloat(x.toFixed(1)),
                    y: parseFloat(finalY.toFixed(2))
                });
            }
            
            return points;
        }
        
        // ============================================
        // Построение графика
        // ============================================
        function renderChart() {
            // Генерируем точки для линии (диапазон температур 0-1200°C)
            const linePoints = generateLinePoints(materialData.point, materialData.slope, 0, 1200, 100);
            
            // Экспериментальная точка
            const experimentalPoint = [{
                x: materialData.point.x,
                y: materialData.point.y
            }];
            
            const ctx = document.getElementById('tempChart').getContext('2d');
            if (currentChart) {
                currentChart.destroy();
            }
            
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Зависимость прочности от температуры',
                            data: linePoints,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.05)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0,
                            pointRadius: 0,
                            pointHoverRadius: 2,
                            pointHoverBackgroundColor: '#66700'
                        },
                        {
                            label: 'Экспериментальная точка',
                            data: experimentalPoint,
                            borderColor: '#f59e0b',
                            backgroundColor: '#f59e0b',
                            pointRadius: 7,
                            pointHoverRadius: 10,
                            pointBorderColor: 'white',
                            pointBorderWidth: 3,
                            type: 'scatter',
                            showLine: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Минимальная прочность (МПа)',
                                font: { size: 17, weight: '500' },
                                color: '#6c757d'
                            },
                            grid: {
                                color: '#e9ecef',
                                drawBorder: false
                            },
                            ticks: {
                                stepSize: 100,
                                color: '#495057'
                            }
                        },
                        x: {
                            type: 'linear',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Температура (°C)',
                                font: { size: 17, weight: '500' },
                                color: '#6c757d'
                            },
                            grid: {
                                color: '#e9ecef',
                                drawBorder: false
                            },
                            ticks: {
                                stepSize: 200,
                                color: '#495057',
                                callback: function(value) {
                                    return value + '°C';
                                }
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#fff',
                            bodyColor: '#e9ecef',
                            borderColor: '#667eea',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.label === 'Экспериментальная точка') {
                                        return `Эксперимент: ${context.parsed.y.toFixed(0)} МПа при ${context.parsed.x.toFixed(0)}°C`;
                                    }
                                    return `Прочность: ${context.parsed.y.toFixed(0)} МПа\nТемпература: ${context.parsed.x.toFixed(0)}°C`;
                                }
                            }
                        },
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 10,
                                padding: 15,
                                font: { size: 12 }
                            }
                        }
                    },
                    elements: {
                        point: {
                            hoverRadius: 8
                        }
                    }
                }
            });
        }
        
        // Запускаем построение графика
        renderChart();
        
        // Функция для обновления данных (для подключения бэкенда)
        window.updateChartData = function(point, slope) {
            materialData.point = point;
            materialData.slope = slope;
            renderChart();
        };
        
        console.log('Для обновления данных используйте: updateChartData({x: 650, y: 600}, 0.11)');

    </script>
</body>
</html>
