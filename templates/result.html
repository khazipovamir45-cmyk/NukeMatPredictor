<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NukeMatPredictor - Рекомендации</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Дополнительные стили только для страницы результатов */
        .results-page {
            max-width: 1300px;
            margin: 0 auto;
            background: #0e233b;
            padding: 50px 60px;
        }
        
        .results-page h2 {
            font-size: 36px;
            color: white;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .params-badge {
            background: linear-gradient(135deg, #1e6df2 0%, #0f4c8a 100%);
            display: inline-block;
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        
        .params-badge i {
            margin: 0 5px;
            color: #7bc9ff;
        }
        
        .materials-table-container {
            background: #112c48;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #265177;
            overflow-x: auto;
        }
        
        .materials-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        .materials-table th,
        .materials-table td {
            padding: 18px 15px;
            text-align: left;
            border-bottom: 1px solid #265177;
            color: white;
        }
        
        .materials-table th {
            background: #0a1f33;
            font-weight: 600;
            color: #7bc9ff;
            font-size: 1rem;
        }
        
        .materials-table tr:last-child td {
            border-bottom: none;
        }
        
        .status-icon {
            font-size: 1.2rem;
            width: 45px;
            text-align: center;
        }
        
        .status-best {
            color: #6fcf97;
        }
        
        .status-good {
            color: #f2c94c;
        }
        
        .status-warning {
            color: #eb5757;
        }
        
        .compat-text {
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        
        .compat-text.best {
            color: #6fcf97;
        }
        
        .compat-text.good {
            color: #f2c94c;
        }
        
        .compat-text.warning {
            color: #eb5757;
        }
        
        .material-name {
            font-weight: 500;
            font-size: 1rem;
            color: #e0e0e0;
        }
        
        .chart-iframe-container {
            background: #112c48;
            border-radius: 30px;
            padding: 0;
            margin-bottom: 30px;
            border: 1px solid #265177;
            overflow: hidden;
        }
        
        .chart-iframe {
            width: 100%;
            height: 550px;
            border: none;
            display: block;
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-icon {
            background: #0a1f33;
            border: 1px solid #2d5780;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-icon i {
            color: #7bc9ff;
        }
        
        .btn-icon:hover {
            background: #1e3a5f;
            transform: translateY(-2px);
        }
        
        .loading-spinner {
            text-align: center;
            padding: 50px;
            background: #112c48;
            border-radius: 30px;
        }
        
        .loading-spinner i {
            font-size: 3rem;
            color: #7bc9ff;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .results-page {
                padding: 30px 20px;
            }
            
            .results-page h2 {
                font-size: 28px;
            }
            
            .chart-iframe {
                height: 400px;
            }
            
            .materials-table th,
            .materials-table td {
                padding: 12px 10px;
            }
            
            .status-icon {
                font-size: 1rem;
                width: 35px;
            }
            
            .compat-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <i class="fas fa-atom"></i>
                NMP
            </div>
            <ul class="nav-menu">
                <li><a href="/"><i class="fas fa-home"></i> Главная</a></li>
                <li><a href="/form"><i class="fas fa-calculator"></i> Начать расчёт</a></li>
                <li><a href="/#about"><i class="fas fa-info-circle"></i> О проекте</a></li>
                <li><a href="#"><i class="fas fa-database"></i> База данных</a></li>
                <li><a href="https://github.com/khazipovamir45-cmyk/NukeMatPredictor.git"><i class="fab fa-github"></i> GitHub</a></li>
            </ul>
        </nav>
    </header>

    <main class="results-page">
        <h2>Рекомендуемые материалы</h2>
        
        <div class="params-badge" id="paramsBadge"></div>

        <div id="resultsContainer">
            <div class="loading-spinner">
                <i class="fas fa-atom fa-spin"></i>
                <p>Загрузка...</p>
            </div>
        </div>

        <div class="chart-iframe-container">
            <iframe class="chart-iframe" src="/static/chartjs.html" title="График зависимости прочности от дозы облучения"></iframe>
        </div>

        <div class="action-buttons">
            <button class="btn-icon" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Экспорт PDF</button>
            <button class="btn-icon" id="shareBtn"><i class="fas fa-share-alt"></i> Поделиться</button>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026 NukeMatPredictor · Команда МИФИ</p>
            <div class="team-links">
                <span>Амир (PL)</span>
                <span>Богдан (BE)</span>
                <span>Вероника (FE)</span>
                <span>Соня (FE)</span>
                <span>Саша (BA)</span>
            </div>
        </div>
    </footer>

    <script>
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const temperature = parseFloat(urlParams.get('temperature')) || 850;
        const dose = parseFloat(urlParams.get('dose')) || 12.5;
        const strength = parseFloat(urlParams.get('strength')) || 450;
        
        document.getElementById('paramsBadge').innerHTML = `
            <i class="fas fa-thermometer-half"></i> ${temperature}°C &nbsp;·&nbsp;
            <i class="fas fa-radiation"></i> ${dose} dpa &nbsp;·&nbsp;
            <i class="fas fa-hammer"></i> ≥${strength} МПа
        `;
        
        // База данных материалов
        const materialsDB = [
            { id: 1, name: "Карбид кремния (SiC)", maxTemp: 1200, strength: 350, dose: 50 },
            { id: 2, name: "Сплав ЭК-181", maxTemp: 650, strength: 580, dose: 30 },
            { id: 3, name: "Сталь ЭП823-Ш", maxTemp: 700, strength: 600, dose: 35 },
            { id: 4, name: "Сталь 316L", maxTemp: 550, strength: 480, dose: 10 },
            { id: 5, name: "V-4Cr-4Ti", maxTemp: 700, strength: 460, dose: 30 },
            { id: 6, name: "Zircaloy-4", maxTemp: 340, strength: 335, dose: 8 },
            { id: 7, name: "Графит", maxTemp: 800, strength: 25, dose: 1 },
            { id: 8, name: "UO₂", maxTemp: 1200, strength: 150, dose: 60 },
            { id: 9, name: "B₄C", maxTemp: 800, strength: 200, dose: 25 },
            { id: 10, name: "Инконель 718", maxTemp: 650, strength: 1000, dose: 12 }
        ];
        
        // Функция расчета очков
        function calculateScore(material, temp, doseReq, strengthReq) {
            let score = 0;
            if (material.maxTemp >= temp) score += 35;
            if (material.dose >= doseReq) score += 35;
            if (material.strength >= strengthReq) score += 30;
            return score;
        }
        
        // Функция определения статуса
        function getStatus(index) {
            if (index === 0) {
                return {  
                    iconClass: 'status-best', 
                    text: ' ★Лучший выбор',
                    textClass: 'best'
                };
            } else if (index === 1) {
                return { 
                    iconClass: 'status-good', 
                    text: '✓Подходит',
                    textClass: 'good'
                };
            } else {
                return { 
                    iconClass: 'status-warning', 
                    text: '✗Не рекомендуется',
                    textClass: 'warning'
                };
            }
        }
        
        // Основная функция
        function init() {
            // Расчет очков и сортировка
            const materialsWithScore = materialsDB.map(m => ({
                ...m,
                score: calculateScore(m, temperature, dose, strength)
            })).sort((a, b) => b.score - a.score);
            
            // Берем только 3 лучших
            const top3 = materialsWithScore.slice(0, 3);
            
            // Генерация таблицы
            let tableHtml = `
                <div class="materials-table-container">
                    <table class="materials-table">
                        <thead>
                            <tr>
                                <th style="width: 45px"></th>
                                <th>Материал</th>
                                <th>Макс. температура</th>
                                <th>Доза облучения</th>
                                <th>Прочность</th>
                                <th>Совместимость</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            top3.forEach((m, index) => {
                const status = getStatus(index);
                
                tableHtml += `
                    <tr>
                        <td class="status-icon">
                            <i class=" ${status.iconClass}" style="font-size: 0.8rem;"></i>
                        </td>
                        <td class="material-name">${m.name}</td>
                        <td>${m.maxTemp}°C</td>
                        <td>${m.dose} dpa</td>
                        <td>${m.strength} МПа</td>
                        <td class="compat-text ${status.textClass}">${status.text}</td>
                    </tr>
                `;
            });
            
            tableHtml += `
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('resultsContainer').innerHTML = tableHtml;
        }
        
        // Запуск
        init();
        
        // Обработчики кнопок
        document.getElementById('exportPdfBtn').onclick = () => alert('Экспорт PDF: Ctrl+P');
        document.getElementById('shareBtn').onclick = () => {
            if (navigator.share) navigator.share({ title: 'NukeMatPredictor', url: location.href });
            else navigator.clipboard.writeText(location.href).then(() => alert('Ссылка скопирована'));
        };
    </script>
</body>
</html>
