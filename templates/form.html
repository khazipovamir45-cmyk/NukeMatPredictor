<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NukeMatPredictor - Расчёт</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <i class="fas fa-atom"></i>
                <span>NMP</span>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Главная</a></li>
                <li><a href="{{ url_for('form') }}" class="active"><i class="fas fa-calculator"></i> Начать расчёт</a></li>
                <li><a href="{{ url_for('index') }}#about"><i class="fas fa-info-circle"></i> О проекте</a></li>
                <li><a href="{{ url_for('download_csv') }}"><i class="fas fa-database"></i> База данных</a></li>
                <li><a href="https://github.com/khazipovamir45-cmyk/NukeMatPredictor.git"><i class="fab fa-github"></i> GitHub</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-page">
            <h2>Введите параметры</h2>
            <div class="form-container">
                <form action="/result" method="POST">
                    <div class="form-group">
                        <label><i class="fas fa-thermometer-half"></i> Температура (°C)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-fire"></i>
                            <input type="number" name="temperature" value="850" step="10" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-bolt"></i> Доза облучения (dpa)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-radiation"></i>
                            <input type="number" name="dose" value="12.5" step="0.5" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-hammer"></i> Минимально требуемая прочность (МПа)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-weight-hanging"></i>
                            <input type="number" name="strength" value="450" step="10" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-fire-alt"></i> Теплопроводность (Вт/(м·К))</label>
                        <div class="input-wrapper">
                            <i class="fas fa-chart-line"></i>
                            <input type="number" name="thermal_cond" value="15.5" step="0.5" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-temperature-high"></i> Теплоёмкость (Дж/(кг·К))</label>
                        <div class="input-wrapper">
                            <i class="fas fa-chart-simple"></i>
                            <input type="number" name="heat_capacity" value="500" step="10" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-calculator"></i> Рассчитать
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026 NukeMatPredictor · МИФИ</p>
            <div class="team-links">
                <span>Амир (PL)</span>
                <span>Богдан (BE)</span>
                <span>Вероника (FE)</span>
                <span>Соня (FE)</span>
                <span>Саша (BA)</span>
            </div>
        </div>
    </footer>
</body>
</html>
